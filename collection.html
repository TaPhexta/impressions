<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection | Impressions Smart Wear</title>
    <meta name="description" content="Explore our latest collection of tailored suits and formal attire.">
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --brand-black: #111111;
            --brand-white: #ffffff;
            --brand-gray: #f3f4f6;
            --brand-gray-dark: #333333;
        }
    }
    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            color: var(--brand-black);
            background-color: var(--brand-white);
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff; }
        ::-webkit-scrollbar-thumb { background: #ccc; }
        ::-webkit-scrollbar-thumb:hover { background: #111; }
    }
    @layer components {
        .btn-sharp {
            @apply border border-[var(--brand-black)] bg-transparent text-[var(--brand-black)] px-8 py-3 uppercase tracking-widest text-sm font-semibold transition-all duration-300 hover:bg-[var(--brand-black)] hover:text-white rounded-none;
        }
        .container-wide {
            @apply max-w-[1440px] mx-auto px-6 md:px-12;
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="components/MobileMenu.js"></script>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/ProductCard.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="components/StickyMobileNav.js"></script>
    <script type="text/babel" src="collection-app.js"></script>
</body>
</html>
