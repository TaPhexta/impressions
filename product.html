<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Impressions Smart Wear</title>
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --brand-black: #111111;
            --brand-white: #ffffff;
            --brand-gray: #f3f4f6;
        }
    }
    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            color: var(--brand-black);
            background-color: var(--brand-white);
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; }
    }
    @layer components {
        .btn-sharp {
            @apply border border-[var(--brand-black)] bg-transparent text-[var(--brand-black)] px-8 py-3 uppercase tracking-widest text-sm font-semibold transition-all duration-300 hover:bg-[var(--brand-black)] hover:text-white rounded-none;
        }
        .container-wide { @apply max-w-[1440px] mx-auto px-6 md:px-12; }
        .size-box {
            @apply w-12 h-12 border border-gray-300 flex items-center justify-center text-sm font-medium transition-all cursor-pointer hover:border-[var(--brand-black)] hover:bg-[var(--brand-black)] hover:text-white;
        }
        .size-box.selected {
            @apply border-[var(--brand-black)] bg-[var(--brand-black)] text-white;
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="components/MobileMenu.js"></script>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="components/StickyMobileNav.js"></script>
    <script type="text/babel" src="product-app.js"></script>
</body>
</html>
